# .github/workflows/deploy.yml
# Automatically deploys the client/ folder to GitHub Pages on every push to master/main.
# No build step needed — pure static files.

name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel superseded runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload client/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './client'   # Only the static client folder is deployed

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
